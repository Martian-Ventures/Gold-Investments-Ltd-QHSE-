{% extends 'base.html' %}
{% block title %}Reset Password | Gold Circle Investments Ltd{% endblock %}

{% block background %}
<div class="auth-page-bg"></div>
{% endblock %}

{% block content %}
<div class="w-full max-w-md animate-fade-in">
  <main class="auth-card">
    <div class="auth-card-header">
      <h2 class="auth-title">Reset Password</h2>
      <p class="auth-subtitle">Enter your new password below.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
      <div class="auth-form-group">
        <label class="auth-label" for="password">New password</label>
        <input id="password" name="password" type="password" class="auth-input" placeholder="New password" required>
      </div>
      <div class="auth-form-group">
        <label class="auth-label" for="confirm_password">Confirm password</label>
        <input id="confirm_password" name="confirm_password" type="password" class="auth-input"
          placeholder="Confirm password" required>
      </div>

      <button class="auth-btn" type="submit">Reset Password</button>
    </form>
  </main>
</div>
{% endblock %}
