{% extends 'base.html' %}
{% block title %}Request Password Reset | Gold Circle Investments Ltd{% endblock %}

{% block background %}
<div class="auth-page-bg"></div>
{% endblock %}

{% block content %}
<div class="w-full max-w-md animate-fade-in">
  <main class="auth-card">
    <div class="auth-card-header">
      <h2 class="auth-title">Password Reset</h2>
      <p class="auth-subtitle">Enter your email and we will send a reset link.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.reset_request') }}">
      <div class="auth-form-group">
        <label class="auth-label" for="email">Email</label>
        <input id="email" name="email" type="email" class="auth-input" placeholder="you@example.com" required>
      </div>

      <div class="flex gap-3 flex-wrap">
        <button class="auth-btn flex-1" type="submit">Send Reset Link</button>
        <a class="btn btn-secondary" href="{{ url_for('auth.login') }}">Back to Login</a>
      </div>
    </form>
  </main>
</div>
{% endblock %}
